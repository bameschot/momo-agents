<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Royal Game of Ur</title>
  <style>
    :root {
      --bg: #0f0f14;
      --surface: #1c1c28;
      --surface-alt: #252535;
      --accent-light: #e8d5a3;
      --accent-shadow: #5b3fa6;
      --rosette: #c8a84b;
      --highlight: #4fc3f7;
      --text: #f0ece0;
      --text-muted: #7a7a9a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      margin: 0;
      padding: 0;
    }

    main {
      max-width: min(100vw, 480px);
      margin: 0 auto;
      padding: 1rem 0.5rem;
    }

    /* Trays styling */
    #tray-light,
    #tray-shadow {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
      background-color: var(--surface);
      border-radius: 0.5rem;
      margin: 0.5rem 0;
    }

    .tray-label {
      font-size: 0.875rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tray-label.light {
      color: var(--accent-light);
    }

    .tray-label.shadow {
      color: var(--accent-shadow);
    }

    .tray-pieces {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-grow: 1;
      flex-wrap: wrap;
    }

    .borne-off-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      flex-shrink: 0;
    }

    .borne-off-label {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .borne-off-badge {
      font-size: 1.25rem;
      font-weight: 700;
      min-width: 2rem;
      text-align: center;
      color: var(--text);
    }

    /* Piece styling */
    .piece {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      transition: box-shadow 0.2s ease;
      min-width: 44px;
      min-height: 44px;
    }

    .piece-light {
      background-color: var(--accent-light);
    }

    .piece-shadow {
      background-color: var(--accent-shadow);
    }

    .piece:hover:not(:disabled) {
      box-shadow: 0 0 0.5rem rgba(255, 255, 255, 0.2);
    }

    /* ── Board Grid ──────────────────────────────────────────── */

    #board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 3px;
      width: 100%;
      background-color: var(--bg);
      padding: 3px;
      border-radius: 6px;
      margin: 0.5rem 0;
    }

    .square {
      aspect-ratio: 1;
      min-height: 44px;
      border-radius: 4px;
      background-color: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: default;
    }

    .square.inactive {
      visibility: hidden;
    }

    .square.battle-lane {
      background-color: var(--surface-alt);
    }

    .square.rosette {
      border: 2px solid var(--rosette);
    }

    .square.rosette.battle-lane {
      background-color: var(--surface-alt);
    }

    .rosette-svg {
      width: 65%;
      height: 65%;
      display: block;
      pointer-events: none;
    }

    /* ── Dice Area ───────────────────────────────────────────── */

    #dice-area {
      background-color: var(--surface);
      border-radius: 0.5rem;
      padding: 1rem;
      margin: 0.5rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .dice-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .die {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .die svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .die[data-value="0"] .die-face {
      fill: var(--surface-alt);
      stroke: var(--text-muted);
      stroke-width: 2;
    }

    .die[data-value="1"] .die-face {
      fill: var(--accent-light);
      stroke: var(--accent-light);
      stroke-width: 1;
    }

    @keyframes spin-tumble {
      0%   { transform: rotate(0deg) scale(1); }
      40%  { transform: rotate(360deg) scale(0.6); }
      100% { transform: rotate(720deg) scale(1); }
    }

    .die.rolling {
      animation: spin-tumble 600ms ease-out forwards;
    }

    #dice-sum {
      font-size: 1rem;
      color: var(--text);
      min-height: 1.5rem;
      text-align: center;
    }

    #btn-roll {
      background-color: var(--accent-light);
      color: var(--bg);
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      min-height: 44px;
      min-width: 120px;
      transition: opacity 0.2s ease;
    }

    #btn-roll:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #btn-roll:hover:not(:disabled) {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <main>
    <div id="status-bar"></div>

    <div id="tray-shadow">
      <div class="tray-label shadow">Shadow</div>
      <div class="tray-pieces" id="tray-shadow-pieces"></div>
      <div class="borne-off-section">
        <div class="borne-off-label">Borne Off</div>
        <div class="borne-off-badge" id="borne-shadow">0</div>
      </div>
    </div>

    <div id="board"></div>

    <div id="tray-light">
      <div class="tray-label light">Light</div>
      <div class="tray-pieces" id="tray-light-pieces"></div>
      <div class="borne-off-section">
        <div class="borne-off-label">Borne Off</div>
        <div class="borne-off-badge" id="borne-light">0</div>
      </div>
    </div>

    <div id="dice-area"></div>
  </main>

  <script>
    // ── Game Data Model ──────────────────────────────────────
    // PLAYER_PATH maps path positions (1-14) to board square IDs for each player
    const PLAYER_PATH = [
      // Player 0 (Light): pos 1-4 (home), pos 5-12 (battle lane), pos 13-14 (end zone)
      [
        undefined,  // pos 0: off-board (waiting)
        'r0c3', 'r0c2', 'r0c1', 'r0c0',  // pos 1-4: home lane
        'r1c0', 'r1c1', 'r1c2', 'r1c3', 'r1c4', 'r1c5', 'r1c6', 'r1c7',  // pos 5-12: battle lane
        'r0c7', 'r0c6',  // pos 13-14: end zone
        undefined  // pos 15: borne off (not a square)
      ],
      // Player 1 (Shadow): pos 1-4 (home), pos 5-12 (battle lane), pos 13-14 (end zone)
      [
        undefined,  // pos 0: off-board (waiting)
        'r2c3', 'r2c2', 'r2c1', 'r2c0',  // pos 1-4: home lane
        'r1c0', 'r1c1', 'r1c2', 'r1c3', 'r1c4', 'r1c5', 'r1c6', 'r1c7',  // pos 5-12: battle lane
        'r2c7', 'r2c6',  // pos 13-14: end zone
        undefined  // pos 15: borne off (not a square)
      ]
    ];

    // Rosette positions (path indices) — same for both players
    const ROSETTE_POSITIONS = [1, 4, 8];

    // Safe square position where captures are not allowed
    const SAFE_SQUARE_POSITION = 8;

    // Battle lane range where captures can occur
    const BATTLE_LANE_RANGE = { min: 5, max: 12 };

    /**
     * Factory function to create initial game state.
     * Returns a fresh GameState object with all pieces in starting positions.
     * Pure function — no side effects, no DOM access.
     */
    function createInitialState() {
      return {
        board: new Map(),  // squareId → { player: 0|1, pieceId: string }
        players: [
          {
            id: 0,
            label: 'Light',
            pieces: [
              { id: 'L0', position: 0 },
              { id: 'L1', position: 0 },
              { id: 'L2', position: 0 },
              { id: 'L3', position: 0 },
              { id: 'L4', position: 0 },
              { id: 'L5', position: 0 },
              { id: 'L6', position: 0 }
            ],
            borneOff: 0
          },
          {
            id: 1,
            label: 'Shadow',
            pieces: [
              { id: 'S0', position: 0 },
              { id: 'S1', position: 0 },
              { id: 'S2', position: 0 },
              { id: 'S3', position: 0 },
              { id: 'S4', position: 0 },
              { id: 'S5', position: 0 },
              { id: 'S6', position: 0 }
            ],
            borneOff: 0
          }
        ],
        currentPlayer: 0,
        phase: 'roll',
        diceValues: [0, 0, 0, 0],
        diceResult: 0,
        validMoves: [],
        selectedPieceId: null
      };
    }

    // Module-level game state
    // eslint-disable-next-line prefer-const
    let gameState = createInitialState();

    // ── Data Model Assertions ────────────────────────────────
    if (typeof console !== 'undefined' && console.assert) {
      // Test that createInitialState() returns independent objects
      const state1 = createInitialState();
      const state2 = createInitialState();
      console.assert(state1 !== state2, 'createInitialState() should return different objects');
      console.assert(state1.board !== state2.board, 'board Maps should be independent');
      console.assert(state1.players !== state2.players, 'players arrays should be independent');

      // Test PLAYER_PATH mappings
      console.assert(PLAYER_PATH[0][1] === 'r0c3', 'Player 0 pos 1 should be r0c3');
      console.assert(PLAYER_PATH[1][1] === 'r2c3', 'Player 1 pos 1 should be r2c3');
      console.assert(PLAYER_PATH[0][8] === 'r1c3', 'Player 0 pos 8 should be r1c3');
      console.assert(PLAYER_PATH[1][8] === 'r1c3', 'Player 1 pos 8 should be r1c3 (shared)');
      console.assert(PLAYER_PATH[0][5] === 'r1c0', 'Player 0 pos 5 should be r1c0');
      console.assert(PLAYER_PATH[0][12] === 'r1c7', 'Player 0 pos 12 should be r1c7');

      // Test that all pieces start at position 0
      state1.players.forEach((player, playerIdx) => {
        player.pieces.forEach((piece, pieceIdx) => {
          console.assert(piece.position === 0, `Player ${playerIdx} piece ${pieceIdx} should start at position 0`);
        });
      });

      console.log('✓ Data model assertions passed');
    }

    // ── Board constants ──────────────────────────────────────
    const ROSETTE_IDS = new Set(['r0c0', 'r0c3', 'r1c3', 'r2c0', 'r2c3']);
    const INACTIVE_IDS = new Set(['r0c4', 'r0c5', 'r2c4', 'r2c5']);

    // Inline SVG rosette motif (6-petal flower)
    const ROSETTE_SVG = `<svg class="rosette-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><g fill="var(--rosette)" transform="translate(12 12)"><ellipse ry="4.5" rx="2.2" cy="-5" transform="rotate(0)"/><ellipse ry="4.5" rx="2.2" cy="-5" transform="rotate(60)"/><ellipse ry="4.5" rx="2.2" cy="-5" transform="rotate(120)"/><ellipse ry="4.5" rx="2.2" cy="-5" transform="rotate(180)"/><ellipse ry="4.5" rx="2.2" cy="-5" transform="rotate(240)"/><ellipse ry="4.5" rx="2.2" cy="-5" transform="rotate(300)"/><circle r="3"/></g></svg>`;

    /**
     * Build the 24 board squares (3 rows × 8 cols) and inject them into #board.
     * Inactive corners are invisible but occupy grid space.
     * Rosette squares display a 6-petal flower SVG motif.
     */
    function buildBoard() {
      const boardEl = document.getElementById('board');
      for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 8; col++) {
          const id = `r${row}c${col}`;
          const div = document.createElement('div');
          const classes = ['square'];

          if (INACTIVE_IDS.has(id)) {
            classes.push('inactive');
          } else {
            if (row === 1) classes.push('battle-lane');
            if (ROSETTE_IDS.has(id)) classes.push('rosette');
            div.setAttribute('data-square-id', id);
          }

          div.className = classes.join(' ');

          if (ROSETTE_IDS.has(id) && !INACTIVE_IDS.has(id)) {
            div.innerHTML = ROSETTE_SVG;
          }

          boardEl.appendChild(div);
        }
      }
    }

    /**
     * Initialize all 14 piece elements and inject them into the DOM.
     * Creates 7 pieces for each player (Light and Shadow).
     * Each piece is a styled div with a unique data-piece-id.
     */
    function initPieces() {
      // Light player pieces (L0–L6)
      const trayLightPiecesContainer = document.getElementById('tray-light-pieces');
      if (trayLightPiecesContainer) {
        trayLightPiecesContainer.innerHTML = ''; // Clear any existing pieces
        for (let i = 0; i < 7; i++) {
          const piece = document.createElement('div');
          piece.className = 'piece piece-light';
          piece.dataset.pieceId = `L${i}`;
          trayLightPiecesContainer.appendChild(piece);
        }
      }

      // Shadow player pieces (S0–S6)
      const trayShadowPiecesContainer = document.getElementById('tray-shadow-pieces');
      if (trayShadowPiecesContainer) {
        trayShadowPiecesContainer.innerHTML = ''; // Clear any existing pieces
        for (let i = 0; i < 7; i++) {
          const piece = document.createElement('div');
          piece.className = 'piece piece-shadow';
          piece.dataset.pieceId = `S${i}`;
          trayShadowPiecesContainer.appendChild(piece);
        }
      }
    }

    /**
     * Build the dice area: 4 die elements, a sum display, and a Roll button.
     * Die state is driven by `data-value` attribute (0=dark, 1=light).
     */
    function buildDiceArea() {
      const diceAreaEl = document.getElementById('dice-area');

      // Row of 4 dice
      const diceRow = document.createElement('div');
      diceRow.className = 'dice-row';
      for (let i = 0; i < 4; i++) {
        const die = document.createElement('div');
        die.className = 'die';
        die.dataset.value = '0';
        die.innerHTML =
          '<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
          '<polygon class="die-face" points="20,2 38,20 20,38 2,20"/>' +
          '</svg>';
        diceRow.appendChild(die);
      }
      diceAreaEl.appendChild(diceRow);

      // Sum display
      const sumEl = document.createElement('div');
      sumEl.id = 'dice-sum';
      sumEl.textContent = '—';
      diceAreaEl.appendChild(sumEl);

      // Roll button
      const btnEl = document.createElement('button');
      btnEl.id = 'btn-roll';
      btnEl.textContent = 'Roll';
      btnEl.setAttribute('aria-label', 'Roll the dice');
      btnEl.addEventListener('click', rollDice);
      diceAreaEl.appendChild(btnEl);
    }

    /**
     * Roll all 4 dice: randomise values, animate, then update display.
     * Debounced: button is disabled during the 600 ms animation.
     */
    function rollDice() {
      const btn = document.getElementById('btn-roll');
      if (!btn || btn.disabled) return;

      // Generate 4 independent binary results
      const values = [0, 1, 2, 3].map(function () {
        return Math.random() < 0.5 ? 0 : 1;
      });
      gameState.diceValues = values;
      gameState.diceResult = values.reduce(function (sum, v) {
        return sum + v;
      }, 0);

      // Disable button and trigger animation
      btn.disabled = true;
      const dice = document.querySelectorAll('.die');
      dice.forEach(function (die) {
        die.classList.add('rolling');
      });

      // After animation completes: update visuals and re-enable button
      setTimeout(function () {
        dice.forEach(function (die, i) {
          die.classList.remove('rolling');
          die.dataset.value = String(gameState.diceValues[i]);
        });
        const sumEl = document.getElementById('dice-sum');
        if (sumEl) sumEl.textContent = 'Rolled: ' + gameState.diceResult;
        btn.disabled = false;
      }, 600);
    }

    // Bootstrap: build board and pieces on page load
    document.addEventListener('DOMContentLoaded', function () {
      buildBoard();
      initPieces();
      buildDiceArea();
    });
  </script>
</body>
</html>
